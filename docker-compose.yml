version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: carbigdata-postgres
    environment:
      POSTGRES_DB: carbigdata
      POSTGRES_USER: carbigdata
      POSTGRES_PASSWORD: carbigdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: carbigdata-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  app:
    build: .
    container_name: carbigdata-app
    depends_on:
      - postgres
      - minio
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/carbigdata
      DB_USER: carbigdata
      DB_PASSWORD: carbigdata
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: carbigdata-storage
      JWT_SECRET: 12345678901234567890123456789012
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  minio-data:
