spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carbigdata}
    username: ${DB_USER:carbigdata}
    password: ${DB_PASSWORD:carbigdata}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:12345678901234567890123456789012}
    expiration-seconds: 1800
  minio:
    url: ${MINIO_URL:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:carbigdata-storage}
