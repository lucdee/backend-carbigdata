<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carros - MVC Básico</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; max-width: 720px; }
        th, td { border: 1px solid #ddd; padding: 0.6rem; text-align: left; }
        th { background-color: #f3f3f3; }
    </style>
</head>
<body>
<h1>Lista de carros</h1>
<p>Exemplo simples de arquitetura MVC com Spring Boot + Thymeleaf.</p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Modelo</th>
        <th>Marca</th>
        <th>Ano</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="carro : ${carros}">
        <td th:text="${carro.id}">1</td>
        <td th:text="${carro.modelo}">Modelo</td>
        <td th:text="${carro.marca}">Marca</td>
        <td th:text="${carro.ano}">2024</td>
    </tr>
    </tbody>
</table>
</body>
</html>
